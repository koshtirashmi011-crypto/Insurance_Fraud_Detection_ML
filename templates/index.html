<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analysis Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-100">
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800 text-center">🚗 Insurance Fraud Detection Analysis</h1>
        </div>

        <form action="/predict" method="post" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Customer Age</label>
                <input type="number" name="age" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 35" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Months as Customer</label>
                <input type="number" name="months_as_customer" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 24" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Policy Deductable ($)</label>
                <input type="number" name="policy_deductable" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 1000" required>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Total Claim Amount ($)</label>
                <input type="number" name="total_claim_amount" class="w-full p-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. 15000" required>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition duration-300 shadow-lg">
                Predict fraud
            </button>
        </form>

        {% if prediction_text %}
        <div class="mt-8 p-4 rounded-xl text-center {% if status == 'danger' %} bg-red-50 border border-red-200 {% else %} bg-green-50 border border-green-200 {% endif %}">
            <h3 class="text-xl font-bold {% if status == 'danger' %} text-red-600 {% else %} text-green-600 {% endif %}">
                {{ prediction_text }}
            </h3>
            <p class="text-gray-600 font-medium mt-1">Confidence: {{ fraud_probability }}%</p>
        </div>
        {% endif %}
        
        <div class="mt-6 text-center">
            <a href="/" class="text-blue-500 hover:underline text-sm font-medium">← Back to Home</a>
        </div>
    </div>

</body>
</html>
